<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Koszos klíma – illusztráció">
  <defs>
    <linearGradient id="wallDirty" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e7e5da"/>
      <stop offset="1" stop-color="#d5d2c4"/>
    </linearGradient>
    <linearGradient id="bodyDirty" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ded8c7"/>
      <stop offset="1" stop-color="#c7c1ac"/>
    </linearGradient>
    <pattern id="finsDirty" width="12" height="40" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="40" stroke="#7d7663" stroke-width="2.5"/>
    </pattern>
    <!-- grimy zaj-textúra -->
    <filter id="grime" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.055 0.09" numOctaves="3" seed="11" result="n"/>
      <feColorMatrix in="n" type="matrix"
        values="0 0 0 0 0.30
                0 0 0 0 0.25
                0 0 0 0 0.14
                0 0 0 0.7 0"/>
    </filter>
    <!-- penész folt (elmosott) -->
    <radialGradient id="mold" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#2f3b28" stop-opacity="0.75"/>
      <stop offset="60%" stop-color="#3c4a2f" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#3c4a2f" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="bodyClip">
      <rect x="130" y="150" width="540" height="152" rx="22"/>
    </clipPath>
  </defs>

  <!-- fal (fakóbb, kissé foltos) -->
  <rect width="800" height="500" fill="url(#wallDirty)"/>
  <ellipse cx="400" cy="470" rx="360" ry="60" fill="#4a4535" opacity="0.12"/>
  <!-- árnyék az egység alatt -->
  <ellipse cx="400" cy="312" rx="285" ry="20" fill="#2a2718" opacity="0.16"/>

  <!-- klíma test (elszíneződött) -->
  <rect x="130" y="150" width="540" height="152" rx="22" fill="url(#bodyDirty)" stroke="#a89f86" stroke-width="2"/>

  <!-- felső beszívó rácsok (poros) -->
  <g stroke="#9a927b" stroke-width="4" stroke-linecap="round">
    <line x1="162" y1="176" x2="638" y2="176"/>
    <line x1="162" y1="191" x2="638" y2="191"/>
    <line x1="162" y1="206" x2="638" y2="206"/>
  </g>

  <!-- eltömődött lamellák -->
  <rect x="164" y="222" width="472" height="40" fill="url(#finsDirty)"/>
  <!-- kosz-lerakódás a lamellákon -->
  <rect x="164" y="222" width="472" height="40" fill="#6b5f3f" opacity="0.35"/>

  <!-- alsó légterelő (koszos) -->
  <rect x="156" y="274" width="488" height="20" rx="10" fill="#4a4636"/>

  <!-- LED (halvány / kikapcsolt) -->
  <circle cx="626" cy="176" r="10" fill="#6f6a55" opacity="0.35"/>
  <circle cx="626" cy="176" r="6" fill="#7a7560"/>

  <!-- rárakódott grime textúra a testen -->
  <g clip-path="url(#bodyClip)">
    <rect x="130" y="150" width="540" height="152" filter="url(#grime)" opacity="0.55"/>
    <!-- csorgásnyomok a rácsokból -->
    <g fill="#5b5138" opacity="0.4">
      <path d="M210,208 q3,40 -2,80 l6,0 q4,-42 2,-80 z"/>
      <path d="M330,208 q2,55 -3,95 l6,0 q4,-46 3,-93 z"/>
      <path d="M470,208 q4,35 0,70 l6,0 q3,-38 0,-72 z"/>
      <path d="M560,208 q2,48 -2,88 l6,0 q4,-44 2,-86 z"/>
    </g>
  </g>

  <!-- penészfoltok -->
  <ellipse cx="200" cy="284" rx="46" ry="26" fill="url(#mold)"/>
  <ellipse cx="600" cy="286" rx="52" ry="24" fill="url(#mold)"/>
  <ellipse cx="410" cy="292" rx="60" ry="18" fill="url(#mold)"/>
  <ellipse cx="150" cy="240" rx="24" ry="30" fill="url(#mold)"/>

  <!-- porpöttyök / hulló kosz -->
  <g fill="#5b5138">
    <circle cx="250" cy="330" r="2.5" opacity="0.5"/>
    <circle cx="300" cy="352" r="2" opacity="0.45"/>
    <circle cx="360" cy="338" r="3" opacity="0.5"/>
    <circle cx="430" cy="360" r="2.2" opacity="0.4"/>
    <circle cx="480" cy="336" r="2.6" opacity="0.5"/>
    <circle cx="540" cy="356" r="2" opacity="0.42"/>
    <circle cx="205" cy="352" r="1.8" opacity="0.4"/>
    <circle cx="395" cy="330" r="1.8" opacity="0.4"/>
  </g>

  <!-- kellemetlen szag jelzése -->
  <g stroke="#6b6350" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.55">
    <path d="M360,330 q10,-14 0,-28 q-10,-14 0,-28"/>
    <path d="M400,338 q10,-14 0,-28 q-10,-14 0,-28"/>
    <path d="M440,330 q10,-14 0,-28 q-10,-14 0,-28"/>
  </g>
</svg>
