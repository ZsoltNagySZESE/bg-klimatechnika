<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Tiszta klíma – illusztráció">
  <defs>
    <linearGradient id="wallClean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef5f4"/>
      <stop offset="1" stop-color="#dcebe8"/>
    </linearGradient>
    <linearGradient id="bodyClean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e8f2f1"/>
    </linearGradient>
    <linearGradient id="airClean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#54a8aa" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#54a8aa" stop-opacity="0"/>
    </linearGradient>
    <pattern id="finsClean" width="12" height="40" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="40" stroke="#bfe0dc" stroke-width="2.5"/>
    </pattern>
    <g id="sparkClean">
      <path d="M0,-11 C0,-3 3,0 11,0 C3,0 0,3 0,11 C0,3 -3,0 -11,0 C-3,0 0,-3 0,-11 Z" fill="#54a8aa"/>
    </g>
  </defs>

  <!-- fal -->
  <rect width="800" height="500" fill="url(#wallClean)"/>
  <!-- lágy árnyék az egység alatt -->
  <ellipse cx="400" cy="312" rx="285" ry="20" fill="#0e3b3c" opacity="0.08"/>

  <!-- klíma test -->
  <rect x="130" y="150" width="540" height="152" rx="22" fill="url(#bodyClean)" stroke="#cfe2df" stroke-width="2"/>

  <!-- felső beszívó rácsok -->
  <g stroke="#d7e6e4" stroke-width="4" stroke-linecap="round">
    <line x1="162" y1="176" x2="638" y2="176"/>
    <line x1="162" y1="191" x2="638" y2="191"/>
    <line x1="162" y1="206" x2="638" y2="206"/>
  </g>

  <!-- tiszta lamellák (hőcserélő) -->
  <rect x="164" y="222" width="472" height="40" fill="url(#finsClean)"/>

  <!-- alsó légterelő -->
  <rect x="156" y="274" width="488" height="20" rx="10" fill="#123c3d"/>

  <!-- működésjelző LED -->
  <circle cx="626" cy="176" r="11" fill="#54a8aa" opacity="0.25"/>
  <circle cx="626" cy="176" r="6" fill="#54a8aa"/>

  <!-- friss légáram -->
  <g>
    <rect x="332" y="300" width="6" height="72" rx="3" fill="url(#airClean)"/>
    <rect x="372" y="300" width="6" height="98" rx="3" fill="url(#airClean)"/>
    <rect x="412" y="300" width="6" height="82" rx="3" fill="url(#airClean)"/>
    <rect x="452" y="300" width="6" height="60" rx="3" fill="url(#airClean)"/>
  </g>

  <!-- csillanások (tisztaság) -->
  <use href="#sparkClean" transform="translate(196,126) scale(1.05)"/>
  <use href="#sparkClean" transform="translate(612,250) scale(0.75)"/>
  <use href="#sparkClean" transform="translate(150,240) scale(0.6)"/>
</svg>
